name: Update Quote & Weather

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/5 * * * *" # Setiap 5 menit UTC
  workflow_dispatch: # Bisa dijalankan manual

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get Random Quote
        id: quote
        run: |
          RESPONSE=$(curl -s --fail "https://zenquotes.io/api/random") || exit 1
          QUOTE=$(echo "$RESPONSE" | jq -r '.[0].q')
          AUTHOR=$(echo "$RESPONSE" | jq -r '.[0].a')
          echo "QUOTE=$QUOTE" >> $GITHUB_ENV
          echo "AUTHOR=$AUTHOR" >> $GITHUB_ENV

      - name: Get Weather (Semarang)
        id: weather
        run: |
          WEATHER_JSON=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=-7.0051&longitude=110.4381&current_weather=true")
          TEMP=$(echo "$WEATHER_JSON" | jq -r '.current_weather.temperature')
          WIND=$(echo "$WEATHER_JSON" | jq -r '.current_weather.windspeed')
          TIME=$(echo "$WEATHER_JSON" | jq -r '.current_weather.time')
          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "WIND=$WIND" >> $GITHUB_ENV
          echo "TIME=$TIME" >> $GITHUB_ENV

      - name: Update README.md
        run: |
          # Update quote
          NEW_QUOTE="> ${{ env.QUOTE }}\n> — *${{ env.AUTHOR }}*\n\n_Last updated: $(date -u)_"
          awk -v quote="$NEW_QUOTE" '
            BEGIN { print_quote = 0 }
            /<!-- START_QUOTE -->/ { print; print_quote = 1; print quote; next }
            /<!-- END_QUOTE -->/ { print_quote = 0 }
            !print_quote { print }
          ' README.md > temp1.md && mv temp1.md README.md

          # Update weather
          NEW_WEATHER="- Suhu: ${{ env.TEMP }}°C\n- Angin: ${{ env.WIND }} km/jam\n- Data waktu: ${{ env.TIME }} UTC\n\n_Last updated: $(date -u)_"
          awk -v weather="$NEW_WEATHER" '
            BEGIN { print_weather = 0 }
            /<!-- START_WEATHER -->/ { print; print_weather = 1; print weather; next }
            /<!-- END_WEATHER -->/ { print_weather = 0 }
            !print_weather { print }
          ' README.md > temp2.md && mv temp2.md README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update quote and weather" || echo "No changes to commit"
          git push
